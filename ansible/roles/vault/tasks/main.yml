---
- name: Ensure group "vault" exists
  group:
    name: "{{ vault_group }}"
    state: present

- name: Ensure user "vault" exists
  user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: yes
    shell: /bin/false
    home: /etc/vault.d

- name: Install required packages
  package:
    name:
      - unzip
      - curl
      - jq
    state: present

- name: Check if Vault is already installed
  stat:
    path: "{{ vault_bin_dir }}/vault"
  register: vault_installed

- name: Download Vault binary
  unarchive:
    src: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
    dest: "{{ vault_bin_dir }}"
    remote_src: yes
  when: not vault_installed.stat.exists

- name: Create Vault config directory
  file:
    path: "{{ vault_config_dir }}"
    state: directory
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: '0755'

- name: Create Vault data directory
  file:
    path: "{{ vault_data_dir }}"
    state: directory
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: '0750'

- name: Template Vault configuration file
  template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: '0640'
  notify: restart vault

- name: Template Vault systemd service
  template:
    src: vault.service.j2
    dest: /etc/systemd/system/vault.service
    mode: '0644'
  notify: restart vault

- name: Ensure Vault service is started and enabled
  systemd:
    name: vault
    state: started
    enabled: yes
    daemon_reload: yes
